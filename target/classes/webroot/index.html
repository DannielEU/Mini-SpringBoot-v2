<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Servidor HTTP - Prueba</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        h1 {
            margin: 0;
            font-size: 2.5em;
        }

        p {
            font-size: 1.2em;
            margin-top: 10px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background-color: #ffffff;
            color: #2a5298;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #ddd;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Daniel Eduardo Useche</h1>
    <p>Estudiante de TDSE</p>
    <button onclick="mostrarMensaje()">Haz clic aquí</button>
</div>

<script>
    function mostrarMensaje() {
        alert("Servidor funcionando correctamente, por Daniel Useche");
    }
</script>

</body>
</html>
